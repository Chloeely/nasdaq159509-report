name: Nasdaq159509 Daily Report


on:

  schedule:

    # 北京时间每天07:00
    # GitHub使用UTC时间
    - cron: '0 23 * * *'


  workflow_dispatch:



jobs:

  report:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout

      uses: actions/checkout@v4



    - name: Setup Python

      uses: actions/setup-python@v5

      with:

        python-version: "3.11"



    - name: Install

      run: |

        pip install -r requirements.txt



    - name: Run report

      env:

        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}

        CHAT_ID: ${{ secrets.CHAT_ID }}

      run: |

        python main.py
